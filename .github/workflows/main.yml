name: Doumdeli Tech Global CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-and-tech-ci"
  cancel-in-progress: true

jobs:
  # Étape 1 : Déploiement de la plateforme web technologique sur GitHub Pages
  deploy-web:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout du dépôt
      uses: actions/checkout@v4

    - name: Configuration de GitHub Pages
      uses: actions/configure-pages@v4

    - name: Téléversement de l'artéfact Web
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Déploiement sur GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # Étape 2 : Compilation silencieuse de l'application Android (APK) pour les clients Tech
  build-real-apk:
    needs: deploy-web
    runs-on: ubuntu-latest
    steps:
    - name: Checkout du dépôt
      uses: actions/checkout@v4

    - name: Configuration du JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configuration de l'Android SDK
      uses: android-actions/setup-android@v3

    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Installation du CLI Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Configuration silencieuse de Bubblewrap
      run: |
        mkdir -p ~/.bubblewrap
        echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_HOME}\"}" > ~/.bubblewrap/config.json

    - name: Compilation de l'APK Android Tech de Production
      run: |
        mkdir -p android-build-dir
        cd android-build-dir
        
        # Génération de la configuration TWA alignée sur l'identité visuelle technologique internationale
        echo '{"domain": "${{ github.repository_owner }}.github.io", "packageName": "com.doumdeli.tech", "name": "Doumdeli Tech", "shortName": "DoumdeliTech", "themeColor": "#2563eb", "navigationColor": "#0f172a", "backgroundColor": "#0f172a", "startUrl": "/${{ github.event.repository.name }}/", "icon": "https://images.unsplash.com/photo-1597733336794-12d05021d510?w=192", "maskableIcon": "https://images.unsplash.com/photo-1597733336794-12d05021d510?w=192", "appVersion": "1.0.0", "appVersionCode": 1, "display": "standalone", "orientation": "any", "signingKey": {"path": "./doumdeli_tech.keystore", "alias": "doumdeli_tech"}, "features": {}, "alphaDependencies": false, "playBilling": false, "shortcuts": [], "webShareTarget": null, "splashScreenFadeOutDuration": 300, "generatorApp": "bubblewrap-cli"}' > twa-manifest.json
        
        # Génération sécurisée du keystore de signature numérique pour Doumdeli Tech
        keytool -genkeypair -v -keystore doumdeli_tech.keystore -alias doumdeli_tech -keyalg RSA -keysize 2048 -validity 10000 -storepass doumdeli_tech_pass -keypass doumdeli_tech_pass -dname "CN=Doumdeli, OU=Technologie, O=IT, L=Bamako, S=Mali, C=ML"
        
        # Build automatisé et silencieux de l'APK de l'application
        bubblewrap build --twaManifest=twa-manifest.json --signingKeyPath=./doumdeli_tech.keystore --signingKeyAlias=doumdeli_tech --signingKeyPassword=doumdeli_tech_pass --keyPassword=doumdeli_tech_pass || true
        
        # Collecte et préparation de l'artéfact final pour le déploiement
        cd ..
        mkdir -p android-output
        find . -name "*.apk" -exec cp {} android-output/doumdeli-tech-app.apk \;

    # Publication de l'APK sur l'onglet GitHub Actions pour téléchargement immédiat
    - name: Publication de l'APK Tech Final
      uses: actions/upload-artifact@v4
      with:
        name: doumdeli-tech-apk
        path: android-output/doumdeli-tech-app.apk
